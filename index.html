<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="todo-card" data-testid="test-todo-card" id="todo-card">
        <div class="priority-indicator" data-testid="test-todo-priority-indicator"></div>

        <div id="view-mode">
            <div class="card-content">
                <div class="header-main">
                    <div class="title-section">
                        <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" aria-label="Mark as complete">
                        <h2 id="todo-title" data-testid="test-todo-title">Build *999#</h2>
                    </div>
                    <div class="badges">
                        <span data-testid="test-todo-priority" class="priority-badge">High</span>
                        <span id="overdue-badge" data-testid="test-todo-overdue-indicator" class="hidden">OVERDUE</span>
                    </div>
                </div>

                <div class="status-bar">
                    <span data-testid="test-todo-status" id="status-display">Pending</span>
                    <select id="status-control" data-testid="test-todo-status-control">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>

                <div class="description-section">
                    <button id="expand-btn" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="collapsible-desc">
                        Show Description
                    </button>
                    <div id="collapsible-desc" class="collapsed" data-testid="test-todo-collapsible-section">
                        <p data-testid="test-todo-description">A USSD-based system for managing tasks using mobile phone without internet.</p>
                    </div>
                </div>

                <div class="meta-info">
                    <time id="due-date-display" data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00Z">Due Apr 16, 2026</time>
                    <div id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></div>
                </div>

                <ul data-testid="test-todo-tags" class="tags">
                    <li data-testid="test-todo-work">Work</li>
                    <li data-testid="test-todo-urgent">Urgent</li>
                </ul>

                <div class="actions">
                    <button id="edit-btn" data-testid="test-todo-edit-button">Edit</button>
                    <button data-testid="test-todo-delete-button" class="btn-delete">Delete</button>
                </div>
            </div>
        </div>

        <form id="edit-form" class="hidden" data-testid="test-todo-edit-form">
            <div class="form-group">
                <label for="edit-title">Title</label>
                <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>
            </div>
            <div class="form-group">
                <label for="edit-desc">Description</label>
                <textarea id="edit-desc" data-testid="test-todo-edit-description-input"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-priority">Priority</label>
                    <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-due-date">Due Date</label>
                    <input type="datetime-local" id="edit-due-date" data-testid="test-todo-edit-due-date-input">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" data-testid="test-todo-save-button" class="btn-save">Save</button>
                <button type="button" id="cancel-btn" data-testid="test-todo-cancel-button">Cancel</button>
            </div>
        </form>
    </article>
    <script src="script.js"></script>
</body>
</html>
